<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Musterdorf – Termine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Oswald', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            fire: {
              navy: '#0B1D3A',
              800: '#1A365D',
              700: '#C53030',
              500: '#E53E3E',
              200: '#FED7D7',
              gold: '#D69E2E',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="font-body bg-white text-gray-800">

  <header class="bg-fire-navy text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-3">
        <span class="text-3xl">🚒</span>
        <span class="font-heading text-xl font-bold">FF Musterdorf</span>
      </a>
      <nav class="hidden md:flex space-x-6 text-sm font-semibold uppercase tracking-wider">
        <a href="index.html" class="hover:text-fire-gold">Home</a>
        <a href="about.html" class="hover:text-fire-gold">Über uns</a>
        <a href="operations.html" class="hover:text-fire-gold">Einsätze</a>
        <a href="events.html" class="hover:text-fire-gold border-b-2 border-fire-gold">Termine</a>
        <a href="contact.html" class="hover:text-fire-gold">Kontakt</a>
      </nav>
      <button id="menu-btn" class="md:hidden text-white focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="md:hidden hidden bg-fire-800 px-4 pb-4 space-y-2">
      <a href="index.html" class="block py-1">Home</a>
      <a href="about.html" class="block py-1">Über uns</a>
      <a href="operations.html" class="block py-1">Einsätze</a>
      <a href="events.html" class="block py-1">Termine</a>
      <a href="contact.html" class="block py-1">Kontakt</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-16 md:py-24">
    <h1 class="font-heading text-3xl md:text-5xl font-bold text-fire-navy mb-12">Anstehende Veranstaltungen</h1>
    <div id="events-timeline" class="relative border-l-2 border-fire-gold ml-3">
      <!-- injected by JS -->
    </div>
  </main>

  <footer class="bg-fire-navy text-white/70 py-6 text-center text-sm">
    <p>&copy; 2026 FF Musterdorf | Alle Rechte vorbehalten</p>
  </footer>

  <script>
    // Embedded events data (offline safe)
    const events = [
      {
        title: "Jahreshauptversammlung",
        date: "15. Juli 2026",
        time: "19:00 Uhr",
        location: "Feuerwehrhaus Musterdorf",
        description: "Rückblick und Vorschau, alle Mitglieder sind herzlich eingeladen."
      },
      {
        title: "Tag der offenen Tür",
        date: "22. August 2026",
        time: "10:00 – 17:00 Uhr",
        location: "Rund ums Feuerwehrhaus",
        description: "Fahrzeugschau, Vorführungen, Kinderprogramm und Verpflegung."
      },
      {
        title: "Herbstübung",
        date: "05. September 2026",
        time: "14:00 Uhr",
        location: "Übungsgelände Hinterwald",
        description: "Gemeinsame Übung mit den Nachbarwehren."
      },
      {
        title: "Christbaumverbrennen",
        date: "09. Jänner 2027",
        time: "17:00 Uhr",
        location: "Sportplatz Musterdorf",
        description: "Traditionelles Christbaumverbrennen mit Glühwein und Musik."
      }
    ];

    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    const timeline = document.getElementById('events-timeline');
    timeline.innerHTML = events.map(ev => `
      <div class="mb-10 ml-8 relative">
        <div class="absolute w-4 h-4 bg-fire-gold rounded-full -left-[calc(2rem+6px)] mt-1.5"></div>
        <time class="text-sm font-semibold text-fire-gold">${ev.date}</time>
        <h3 class="font-heading text-xl font-bold text-fire-navy mt-1">${ev.title}</h3>
        <p class="text-gray-700 font-medium">${ev.time} – ${ev.location}</p>
        <p class="text-gray-600 text-sm mt-1">${ev.description || ''}</p>
      </div>
    `).join('');
  </script>
</body>
</html>
