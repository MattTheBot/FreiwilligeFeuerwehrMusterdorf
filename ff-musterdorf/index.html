<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Musterdorf – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Oswald', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            fire: {
              navy: '#0a1929',
              700: '#b91c1c',
              500: '#dc2626',
              200: '#fecaca',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="font-body bg-white text-gray-800">

  <!-- Navigation -->
  <header class="bg-fire-navy text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-3">
        <span class="text-3xl">🚒</span>
        <span class="font-heading text-xl font-bold">FF Musterdorf</span>
      </a>
      <nav class="hidden md:flex space-x-6 text-sm font-semibold uppercase tracking-wider">
        <a href="index.html" class="hover:text-fire-200 border-b-2 border-fire-500">Home</a>
        <a href="about.html" class="hover:text-fire-200">Über uns</a>
        <a href="operations.html" class="hover:text-fire-200">Einsätze</a>
        <a href="events.html" class="hover:text-fire-200">Termine</a>
        <a href="contact.html" class="hover:text-fire-200">Kontakt</a>
      </nav>
      <button id="menu-btn" class="md:hidden text-white focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="md:hidden hidden bg-fire-700 px-4 pb-4 space-y-2">
      <a href="index.html" class="block py-1">Home</a>
      <a href="about.html" class="block py-1">Über uns</a>
      <a href="operations.html" class="block py-1">Einsätze</a>
      <a href="events.html" class="block py-1">Termine</a>
      <a href="contact.html" class="block py-1">Kontakt</a>
    </div>
  </header>

  <!-- Hero (dynamic via JS) -->
  <section id="hero" class="relative bg-fire-navy text-white overflow-hidden">
    <!-- image and content will be injected by data/general.json -->
  </section>

  <!-- Quick stats (dynamic) -->
  <section class="py-12 md:py-16 bg-gray-50" id="stats-section">
    <div class="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6 text-center" id="stats-grid">
      <!-- injected by JS -->
    </div>
  </section>

  <footer class="bg-fire-navy text-white/70 py-6 text-center text-sm">
    <p>&copy; 2026 FF Musterdorf | Alle Rechte vorbehalten</p>
  </footer>

  <!-- Scripts -->
  <script>
    // Mobile menu toggle
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    // Load general data (hero + stats)
    fetch('data/general.json')
      .then(res => res.json())
      .then(data => {
        // Hero
        const hero = document.getElementById('hero');
        hero.innerHTML = `
          <img src="${data.heroImage}" alt="Fire truck" class="absolute inset-0 w-full h-full object-cover opacity-30">
          <div class="relative z-10 max-w-7xl mx-auto px-4 py-28 md:py-40 text-center md:text-left">
            <h1 class="font-heading text-4xl md:text-6xl lg:text-7xl font-bold mb-4">${data.heroHeadline}</h1>
            <p class="text-xl md:text-2xl text-gray-200 mb-8 max-w-2xl">${data.heroSubheadline}</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
              <a href="contact.html" class="inline-block bg-fire-500 hover:bg-fire-700 text-white font-semibold py-3 px-8 rounded-full transition-colors shadow-lg">Kontakt aufnehmen</a>
              <a href="operations.html" class="inline-block border-2 border-white text-white hover:bg-white hover:text-fire-navy font-semibold py-3 px-8 rounded-full transition-colors">Einsätze ansehen</a>
            </div>
          </div>
        `;
        // Stats
        const statsGrid = document.getElementById('stats-grid');
        statsGrid.innerHTML = data.stats.map(s => `
          <div>
            <span class="block font-heading text-3xl md:text-4xl text-fire-500">${s.number}</span>
            <span class="text-sm uppercase tracking-wide text-gray-600">${s.label}</span>
          </div>
        `).join('');
      })
      .catch(err => console.error('Could not load general data', err));
  </script>
</body>
</html>
